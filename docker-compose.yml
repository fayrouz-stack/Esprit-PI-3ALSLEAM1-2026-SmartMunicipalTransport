services:

  postgres:
    image: postgres:16
    container_name: municipal-postgres
    environment:
      POSTGRES_DB: municipal_transport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./municipal-transport-backend
    container_name: municipal-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/municipal_transport
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "0000"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./municipal-transport-angular-app-main
    container_name: municipal-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./municipal-transport-angular-app-main:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata: