<c-card class="mb-4" style="max-width:600px; margin:auto">
  <c-card-header class="d-flex align-items-center gap-2" style="background: linear-gradient(135deg,#321fdb,#1b8eb7); color:white">
    <span style="font-size:1.3rem">🛤️</span>
    <strong class="fs-5 mb-0">Détails de la ligne</strong>
    <c-badge color="light" class="ms-auto text-dark">ID #{{ ligne?.id }}</c-badge>
  </c-card-header>

  <c-card-body>
    <div *ngIf="!ligne" class="text-center py-4">
      <div class="spinner-border text-primary"></div>
    </div>

    <div *ngIf="ligne" class="row g-3">
      <div class="col-12">
        <div class="p-3 rounded" style="background:#f8f9fa; border-left: 4px solid #321fdb">
          <small class="text-muted text-uppercase fw-semibold">Numéro de ligne</small>
          <div class="fs-4 fw-bold text-primary mt-1">🚌 {{ ligne.numero }}</div>
        </div>
      </div>

      <div class="col-12">
        <div class="p-3 rounded" style="background:#f8f9fa; border-left: 4px solid #1b8eb7">
          <small class="text-muted text-uppercase fw-semibold">Destination</small>
          <div class="fs-5 mt-1">📍 {{ ligne.destination }}</div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4" *ngIf="ligne">
      <button cButton color="secondary" variant="outline" (click)="back()">← Retour</button>
      <button cButton color="warning" variant="outline" [routerLink]="['/lignes/edit', ligne.id]">✏️ Modifier</button>
    </div>
  </c-card-body>
</c-card>
