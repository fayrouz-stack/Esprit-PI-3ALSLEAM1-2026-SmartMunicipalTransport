<c-card class="mb-4" style="max-width:600px; margin:auto">
  <c-card-header class="d-flex align-items-center gap-2" style="background: linear-gradient(135deg,#2eb85c,#1a7a3f); color:white">
    <span style="font-size:1.3rem">📍</span>
    <strong class="fs-5 mb-0">Détails de la station</strong>
    <c-badge color="light" class="ms-auto text-dark">ID #{{ station?.id }}</c-badge>
  </c-card-header>

  <c-card-body>
    <div *ngIf="!station" class="text-center py-4">
      <div class="spinner-border text-success"></div>
    </div>

    <div *ngIf="station" class="row g-3">
      <div class="col-12">
        <div class="p-3 rounded" style="background:#f8f9fa; border-left: 4px solid #2eb85c">
          <small class="text-muted text-uppercase fw-semibold">Nom de la station</small>
          <div class="fs-4 fw-bold text-success mt-1">📍 {{ station.nom }}</div>
        </div>
      </div>

      <div class="col-12">
        <div class="p-3 rounded" style="background:#f8f9fa; border-left: 4px solid #6c757d">
          <small class="text-muted text-uppercase fw-semibold">Adresse</small>
          <div class="mt-1">📮 {{ station.adresse }}</div>
        </div>
      </div>

      <div class="col-12">
        <div class="p-3 rounded" style="background:#f8f9fa; border-left: 4px solid #1a7a3f">
          <small class="text-muted text-uppercase fw-semibold">Ville</small>
          <div class="mt-1">🏙️ {{ station.ville }}</div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4" *ngIf="station">
      <button cButton color="secondary" variant="outline" (click)="back()">← Retour</button>
      <button cButton color="warning" variant="outline" [routerLink]="['/stations/edit', station.id]">✏️ Modifier</button>
    </div>
  </c-card-body>
</c-card>
