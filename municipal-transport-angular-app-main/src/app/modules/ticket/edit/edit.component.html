<c-card class="mb-4" style="max-width:700px; margin:auto">
  <c-card-header class="d-flex align-items-center gap-2"
    style="background: linear-gradient(135deg,#f9a825,#e65100); color:white">
    <span style="font-size:1.3rem">✏️</span>
    <strong class="fs-5 mb-0">Modifier le ticket</strong>
    <c-badge color="light" class="ms-auto text-dark">{{ ticket.numero }}</c-badge>
  </c-card-header>

  <c-card-body>
    <form #form="ngForm" (ngSubmit)="update(form)" novalidate>

      <!-- Référence -->
      <div class="p-3 mb-3 rounded" style="background:#f8f8f8; border-left:4px solid #9e9e9e">
        <h6 class="text-muted text-uppercase mb-3" style="font-size:.75rem; letter-spacing:.05em">Référence</h6>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Numéro (lecture seule)</label>
            <input cFormControl name="numero" [ngModel]="ticket.numero" disabled>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">ID Voyage *</label>
            <input cFormControl type="number" name="voyageId"
              [(ngModel)]="ticket.voyageId" required min="1">
          </div>
        </div>
      </div>

      <!-- Passager -->
      <div class="p-3 mb-3 rounded" style="background:#f8f5ff; border-left:4px solid #6610f2">
        <h6 class="text-muted text-uppercase mb-3" style="font-size:.75rem; letter-spacing:.05em">Passager</h6>
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label fw-semibold">Nom *</label>
            <input cFormControl name="passagerNom"
              [(ngModel)]="ticket.passagerNom" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Email</label>
            <input cFormControl type="email" name="passagerEmail"
              [(ngModel)]="ticket.passagerEmail">
          </div>
        </div>
      </div>

      <!-- Paiement -->
      <div class="p-3 mb-4 rounded" style="background:#fff8f0; border-left:4px solid #f9a825">
        <h6 class="text-muted text-uppercase mb-3" style="font-size:.75rem; letter-spacing:.05em">Paiement</h6>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">Nb billets *</label>
            <input cFormControl type="number" name="nombreBillets"
              [(ngModel)]="ticket.nombreBillets" required min="1">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Montant (DT) *</label>
            <input cFormControl type="number" step="0.01" name="montantTotal"
              [(ngModel)]="ticket.montantTotal" required min="0">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Méthode *</label>
            <select cSelect name="methodePaiement"
              [(ngModel)]="ticket.methodePaiement" required>
              <option value="Espèces">Espèces</option>
              <option value="Carte">Carte bancaire</option>
              <option value="Stripe">Stripe</option>
              <option value="PayPal">PayPal</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Statut</label>
            <select cSelect name="statut" [(ngModel)]="ticket.statut">
              <option value="PAYE">Payé</option>
              <option value="EN_ATTENTE">En attente</option>
              <option value="ANNULE">Annulé</option>
            </select>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button cButton color="secondary" type="button" routerLink="/tickets">Annuler</button>
        <button cButton color="warning" type="submit" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Mise à jour...' : '💾 Enregistrer' }}
        </button>
      </div>

    </form>
  </c-card-body>
</c-card>
