<c-card class="mb-4" style="max-width:900px;margin:auto">
  <c-card-header class="d-flex align-items-center gap-2"
                 style="background:linear-gradient(135deg,#321fdb,#1b8eb7);color:white">
    <span style="font-size:1.3rem">🚌</span>
    <strong class="fs-5 mb-0">Ajouter un véhicule</strong>
  </c-card-header>
  
  <c-card-body>
    <form [formGroup]="vehiculeForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">

        <!-- Section gauche -->
        <div class="col-md-6">
          <div class="p-3 rounded" style="background:#f8f9fa;border-left:4px solid #321fdb">
            <h6 class="fw-semibold mb-3">🚌 Informations générales</h6>

            <div class="mb-3">
              <label class="form-label fw-semibold">Matricule *</label>
              <input cFormControl type="text" formControlName="matriculeFourni"
                     [class.is-invalid]="f['matriculeFourni'].invalid && f['matriculeFourni'].touched">
              <div class="invalid-feedback">Le matricule est requis (min. 3 caractères)</div>
            </div>

            <div class="row g-2">
              <div class="col-6">
                <label class="form-label fw-semibold">Marque *</label>
                <input cFormControl type="text" formControlName="marque"
                       [class.is-invalid]="f['marque'].invalid && f['marque'].touched">
                <div class="invalid-feedback">Requis</div>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Modèle *</label>
                <input cFormControl type="text" formControlName="modele"
                       [class.is-invalid]="f['modele'].invalid && f['modele'].touched">
                <div class="invalid-feedback">Requis</div>
              </div>
            </div>

            <div class="row g-2 mt-1">
              <div class="col-6">
                <label class="form-label fw-semibold">Type *</label>
                <select class="form-select" formControlName="typeVehicule">
                  <option value="">Sélectionner…</option>
                  @for (type of typesVehicule; track type) {
                    <option [value]="type">{{ type }}</option>
                  }
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Carburant *</label>
                <select class="form-select" formControlName="carburant">
                  <option value="">Sélectionner…</option>
                  @for (c of carburants; track c) {
                    <option [value]="c">{{ c }}</option>
                  }
                </select>
              </div>
            </div>

            <div class="row g-2 mt-1">
              <div class="col-6">
                <label class="form-label fw-semibold">État</label>
                <select class="form-select" formControlName="etat">
                  @for (e of etats; track e) {
                    <option [value]="e">{{ e }}</option>
                  }
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Kilométrage</label>
                <input cFormControl type="number" formControlName="kilometrage">
              </div>
            </div>

            <div class="mt-2">
              <label class="form-label fw-semibold">Localisation</label>
              <input cFormControl type="text" formControlName="localisation" placeholder="Ville, dépôt...">
            </div>

            <div class="row g-2 mt-1">
              <div class="col-6">
                <label class="form-label fw-semibold">📍 Latitude</label>
                <input cFormControl type="number" step="0.000001" formControlName="latitude" placeholder="36.8065">
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">📍 Longitude</label>
                <input cFormControl type="number" step="0.000001" formControlName="longitude" placeholder="10.1815">
              </div>
            </div>

            <div class="form-check mt-2">
              <input type="checkbox" class="form-check-input" formControlName="vehiculeDispo" id="dispoCk">
              <label class="form-check-label" for="dispoCk">Véhicule disponible</label>
            </div>
          </div>
        </div>

        <!-- Section droite -->
        <div class="col-md-6">
          <div class="p-3 rounded" style="background:#f8f9fa;border-left:4px solid #e55353">
            <h6 class="fw-semibold mb-3">📅 Dates administratives</h6>

            <div class="mb-3">
              <label class="form-label fw-semibold">Fin d'assurance</label>
              <input cFormControl type="date" formControlName="dateFinAssurance">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Prochain contrôle technique</label>
              <input cFormControl type="date" formControlName="dateProchainCt">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">1ère mise en circulation</label>
              <input cFormControl type="date" formControlName="datePremiereMiseCirculation">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Validité exploitation</label>
              <input cFormControl type="date" formControlName="dateValiditeExploitation">
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button cButton color="secondary" type="button" routerLink="/vehicules">Annuler</button>
        <button cButton color="primary" type="submit" [disabled]="submitting">
          @if (submitting) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          {{ submitting ? 'Enregistrement...' : '✅ Enregistrer le véhicule' }}
        </button>
      </div>
    </form>
  </c-card-body>
</c-card>
