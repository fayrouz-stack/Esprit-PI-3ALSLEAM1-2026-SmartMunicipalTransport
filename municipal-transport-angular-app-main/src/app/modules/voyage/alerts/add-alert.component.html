<div class="card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="card-title mb-1">Nouvelle notification de violence</h4>
        <p class="text-muted small mb-0">Enregistrer une alerte manuelle (chauffeur, trajet, heure)</p>
      </div>
      <a class="btn btn-secondary" routerLink="/voyages/alerts">Retour</a>
    </div>

    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Voyage</label>
        <select class="form-select" [formControl]="form.controls['voyageId']">
          <option [value]="0">-- Sélectionner un voyage --</option>
          <option *ngFor="let v of voyages" [value]="v.id">{{ v.ligne?.numero }} → {{ v.ligne?.destination }} ({{ v.dateVoyage | date:'shortDate' }})</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Heure de détection</label>
        <input type="datetime-local" class="form-control" [formControl]="form.controls['detectionTime']" />
      </div>

      <div class="mb-3">
        <label class="form-label">Résumé (nom chauffeur · trajet · heure)</label>
        <textarea class="form-control" rows="3" [formControl]="form.controls['summary']"></textarea>
      </div>

      <div class="d-flex justify-content-end">
        <button class="btn btn-primary" type="submit" [disabled]="submitting">Enregistrer l'alerte</button>
      </div>
    </form>
  </div>
</div>
