<c-card class="mb-4">
  <c-card-header class="d-flex align-items-center gap-2" style="background:linear-gradient(135deg,#f9a825,#e65100);color:white">
    <span style="font-size:1.3rem">✏️</span>
    <strong class="fs-5 mb-0">Modifier le voyage</strong>
  </c-card-header>
  <c-card-body>
    <form [formGroup]="voyageForm" (ngSubmit)="onSubmit()">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="p-3 rounded" style="background:#f8f9fa;border-left:4px solid #321fdb">
            <h6 class="fw-semibold mb-3">📅 Informations du voyage</h6>
            <div class="mb-3">
              <label class="form-label fw-semibold">Date du voyage *</label>
              <input cFormControl type="date" formControlName="dateVoyage"
                     [class.is-invalid]="f['dateVoyage'].invalid && f['dateVoyage'].touched">
              <div class="invalid-feedback">La date est requise</div>
            </div>
            <div class="row g-2">
              <div class="col-6">
                <label class="form-label fw-semibold">Places disponibles *</label>
                <input cFormControl type="number" formControlName="nombrePlacesDisponible"
                       [class.is-invalid]="f['nombrePlacesDisponible'].invalid && f['nombrePlacesDisponible'].touched">
                <div class="invalid-feedback">Minimum 1</div>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Prix (DT) *</label>
                <input cFormControl type="number" step="0.01" formControlName="prix"
                       [class.is-invalid]="f['prix'].invalid && f['prix'].touched">
                <div class="invalid-feedback">Prix requis</div>
              </div>
            </div>
            <div class="mt-3">
              <label class="form-label fw-semibold">🛤️ Ligne *</label>
              <select class="form-select" formControlName="ligneId"
                      [class.is-invalid]="f['ligneId'].invalid && f['ligneId'].touched">
                <option [value]="0">-- Choisir une ligne --</option>
                <option *ngFor="let ligne of lignes" [value]="ligne.id">
                  {{ ligne.numero }} - {{ ligne.destination }}
                </option>
              </select>
              <div class="invalid-feedback">Sélectionnez une ligne</div>
            </div>
            <div class="mt-3">
              <label class="form-label fw-semibold">🕐 Horaire *</label>
              <select class="form-select" formControlName="horaireId"
                      [class.is-invalid]="f['horaireId'].invalid && f['horaireId'].touched">
                <option [value]="0">-- Choisir un horaire --</option>
                <option *ngFor="let h of horaires" [value]="h.id">
                  {{ h.date_voyage | date:'dd/MM/yyyy' }} | {{ h.horaire_depart | slice:0:5 }} → {{ h.horaire_arrive | slice:0:5 }}
                </option>
              </select>
              <div class="invalid-feedback">Sélectionnez un horaire</div>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="p-3 rounded" style="background:#f8f9fa;border-left:4px solid #f9a825">
            <h6 class="fw-semibold mb-3">🚌 Ressources</h6>
            <div class="mb-3">
              <label class="form-label fw-semibold">Véhicule *</label>
              <select class="form-select" formControlName="vehiculeId"
                      [class.is-invalid]="f['vehiculeId'].invalid && f['vehiculeId'].touched">
                <option [value]="0">-- Choisir un véhicule --</option>
                <option *ngFor="let v of vehicules" [value]="v.id">
                  {{ v.marque }} {{ v.modele }} ({{ v.matriculeFourni }})
                </option>
              </select>
              <div class="invalid-feedback">Sélectionnez un véhicule</div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Chauffeur *</label>
              <select class="form-select" formControlName="chauffeurMatricule"
                      [class.is-invalid]="f['chauffeurMatricule'].invalid && f['chauffeurMatricule'].touched">
                <option value="">-- Choisir un chauffeur --</option>
                <option *ngFor="let c of chauffeurs" [value]="c.matricule">
                  {{ c.nom }} {{ c.prenom }}
                </option>
              </select>
              <div class="invalid-feedback">Sélectionnez un chauffeur</div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <button cButton color="secondary" type="button" routerLink="/voyages/list">Annuler</button>
        <button cButton color="warning" type="submit" [disabled]="submitting || voyageForm.invalid">
          <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
          {{ submitting ? 'Enregistrement...' : '💾 Enregistrer' }}
        </button>
      </div>
    </form>
  </c-card-body>
</c-card>
